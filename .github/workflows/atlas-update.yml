name: Atlas Update

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Rebuild even if Atlas commit hasn't changed"
        type: boolean
        default: false
  schedule:
    # Twice daily. Self-aborts if the atlas submodule SHA hasn't advanced
    # (see "Check for Atlas update" step), so no-change runs are cheap.
    - cron: "0 8,20 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment: CI
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check for Atlas update
        id: atlas
        run: |
          OLD=$(git -C vendor/next-gen-atlas rev-parse HEAD)
          git -C vendor/next-gen-atlas fetch origin main
          git -C vendor/next-gen-atlas checkout origin/main
          NEW=$(git -C vendor/next-gen-atlas rev-parse HEAD)
          echo "old=${OLD:0:7}" >> "$GITHUB_OUTPUT"
          echo "short=${NEW:0:7}" >> "$GITHUB_OUTPUT"
          if [ "$OLD" != "$NEW" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Atlas advanced: ${OLD:0:7} → ${NEW:0:7}"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Already at latest (${OLD:0:7}). Use force=true to rebuild anyway."
          fi

      - uses: pnpm/action-setup@v5
        if: steps.atlas.outputs.proceed == 'true'

      - uses: actions/setup-node@v4
        if: steps.atlas.outputs.proceed == 'true'
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: steps.atlas.outputs.proceed == 'true'

      - run: pnpm build:index
        if: steps.atlas.outputs.proceed == 'true'

      - run: pnpm build:glossary
        if: steps.atlas.outputs.proceed == 'true'

      - name: build:addresses
        if: steps.atlas.outputs.proceed == 'true'
        continue-on-error: true
        run: pnpm build:addresses
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: build:snapshot
        if: steps.atlas.outputs.proceed == 'true'
        run: pnpm build:snapshot
        env:
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - run: pnpm build:history
        if: steps.atlas.outputs.proceed == 'true'

      - run: pnpm build:graph
        if: steps.atlas.outputs.proceed == 'true'

      - run: pnpm build:manifest
        if: steps.atlas.outputs.proceed == 'true'

      - run: pnpm test:snap:update
        if: steps.atlas.outputs.proceed == 'true'

      - name: Check process inventory drift
        id: processes
        if: steps.atlas.outputs.proceed == 'true'
        # Never fails the build. Sets dirty/missing/candidates outputs and
        # auto-applies title/doc_no snapshot updates to public/processes.json.
        run: pnpm processes:check

      - name: Open PR
        if: steps.atlas.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT="${{ steps.atlas.outputs.short }}"
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="atlas-update/${DATE}-${SHORT}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          git add vendor/next-gen-atlas public/ graph-snapshots/

          if git diff --cached --quiet; then
            echo "No artifact changes — skipping PR."
            exit 0
          fi

          git commit -m "chore: atlas update ${SHORT} (${DATE})"
          git push origin "$BRANCH"

          # Tag the atlas SHA at this commit so anyone debugging "what was
          # deployed when X happened" can navigate by atlas version.
          # Tag points to the branch HEAD; if the PR is merged the tag stays
          # in main's history, if closed the tag is orphaned (cheap to clean).
          FULL_SHA=$(git -C vendor/next-gen-atlas rev-parse HEAD)
          TAG="atlas-${SHORT}"
          git tag -a "$TAG" -m "Atlas commit ${FULL_SHA}"
          git push origin "$TAG" || echo "Tag $TAG already exists, skipping"

          gh pr create \
            --title "Atlas update ${SHORT} — ${DATE}" \
            --body "$(cat <<EOF
          Automated rebuild from Atlas submodule update.

          **Submodule:** \`${{ steps.atlas.outputs.old }}\` → \`${SHORT}\`

          **Artifacts rebuilt:**
          - \`public/docs.json\` + \`public/search-index.json\` (build:index)
          - \`public/glossary.json\` (build:glossary)
          - \`public/addresses.json\` (build:addresses — skipped if \`ETHERSCAN_API_KEY\` not set)
          - \`public/chain-state.json\` (build:snapshot)
          - \`public/history/\` (build:history)
          - \`public/graph.json\` + \`public/relations.json\` (build:graph)
          - \`graph-snapshots/__snapshots__/\` (test:snap:update)
          EOF
          )" \
            --base main \
            --head "$BRANCH"

      - name: Open / update process review issue
        if: steps.atlas.outputs.proceed == 'true' && steps.processes.outputs.dirty == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT="${{ steps.atlas.outputs.short }}"
          TITLE="Process inventory review needed (atlas ${SHORT})"

          # Find an existing open issue with the processes-review label; reuse
          # it across atlas updates so we don't pile up stale issues.
          EXISTING=$(gh issue list \
            --state open \
            --label processes-review \
            --json number \
            --jq '.[0].number' || echo "")

          # Ensure the label exists (idempotent — ignore "already exists" error).
          gh label create processes-review \
            --color FBCA04 \
            --description "Curated process inventory needs reconciliation with atlas" \
            2>/dev/null || true

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" \
              --title "$TITLE" \
              --body-file .cache/processes-audit.md
            echo "Updated issue #$EXISTING"
          else
            gh issue create \
              --title "$TITLE" \
              --label processes-review \
              --body-file .cache/processes-audit.md
          fi
