name: CF Pages Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: CF Page Deploy
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build index
        # docs.json and search-index.json are gitignored (too large to commit);
        # they must be generated before vite build.
        run: pnpm build:index

      - name: Build graph
        # relations.json is committed but regenerating ensures it matches the
        # docs.json built above (graph reads docs.json as input).
        run: pnpm build:graph

      - name: Build frontend
        # glossary.json, chain-state.json, etc. are committed and used as-is.
        # CF_PAGES=1 sets base:"/" in vite.config.ts so assets resolve correctly
        # at the preview subdomain instead of /redlens/…
        run: pnpm exec vite build
        env:
          CF_PAGES: "1"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: redlens
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}
          wranglerVersion: "3"
