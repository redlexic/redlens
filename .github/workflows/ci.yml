name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build index
        run: pnpm build:index

      - name: Build glossary
        run: pnpm build:glossary

      - name: Build graph
        run: pnpm build:graph

      # Don't rebuild manifest here — the committed public/manifest.json is
      # the source of truth. The "Run tests" step below executes
      # manifest.test.ts which verifies committed hashes match disk
      # (i.e. fresh deterministic rebuilds match what atlas-update PR'd).

      - name: Type check
        run: pnpm build:ts

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Verify graph snapshots
        run: pnpm test:snap

      - name: Bundle
        run: pnpm exec vite build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare runtime types
        run: npx wrangler types
        working-directory: redlens-mcp

      - name: Type check worker
        run: npx tsc --noEmit
        working-directory: redlens-mcp

      - name: Validate schema.sql against local D1
        # `--local` builds a sqlite file in .wrangler/state — no auth needed.
        # Catches malformed SQL before sync-db's `--remote` execution wedges prod.
        run: npx wrangler d1 execute redlens-atlas --local --file=schema.sql
        working-directory: redlens-mcp

      - name: Run worker tests
        run: pnpm test --run --passWithNoTests
        working-directory: redlens-mcp
