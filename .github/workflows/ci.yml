name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
   
      - name: Build index
        run: pnpm build:index

      - name: Build Addresses
        run: pnpm build:addresses  

      - name: Build glossary
        run: pnpm build:glossary

      - name: Build graph
        run: pnpm build:graph

      - name: Build manifest
        run: pnpm build:manifest

      - name: Type check
        run: pnpm build:ts

        - name: Lint
        run: pnpm lint

      - name: Bundle
        run: pnpm exec vite build
