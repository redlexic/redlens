name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      # Files that affect the deployed worker binary or its bindings.
      # Excludes schema.sql, sync-*.mjs, AGENTS.md, test/, tsconfig.json —
      # those don't change what the worker serves.
      - "redlens-mcp/src/**"
      - "redlens-mcp/wrangler.jsonc"
      - "redlens-mcp/package.json"
      - "redlens-mcp/worker-configuration.d.ts"
      - "pnpm-lock.yaml"
      - ".claude/agents/ask-atlas.md" # served at /install/ask-atlas
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

# A second push shouldn't deploy on top of an in-flight one — cancel and
# redeploy from latest.
concurrency:
  group: deploy-worker
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: WorkerDeploy
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: redlens-mcp

      - name: Deploy worker
        run: pnpm run deploy
        working-directory: redlens-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deploy serves requests
        # `wrangler deploy` reporting success doesn't mean the worker actually
        # boots — bindings can fail to resolve. Hit /api/meta and require a
        # well-formed JSON response with a populated atlasCommit.
        run: |
          for i in 1 2 3 4 5; do
            sleep 3
            META=$(curl -fsS https://redlens-mcp.anscharo.workers.dev/api/meta || echo "")
            if echo "$META" | jq -e '.atlasCommit | length > 0' > /dev/null 2>&1; then
              echo "Worker is serving: $(echo $META | jq -c '{atlasCommit, vectorsModel}')"
              exit 0
            fi
            echo "Attempt $i: not yet ready, retrying…"
          done
          echo "::error::Worker did not return a valid /api/meta response after 5 attempts"
          exit 1
