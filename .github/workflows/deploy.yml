name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # Source code + bundle config
      - "src/**"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      # Tracked data artifacts the bundle reads
      - "public/**"
      # Atlas content (submodule pointer change)
      - "vendor/next-gen-atlas"
      # Build pipeline scripts
      - "scripts/required/**"
      - "scripts/lib/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Use the atlas SHA pinned in main (the submodule was checked out at the
      # tracked commit). Atlas advances arrive via atlas-update.yml → PR → merge,
      # so frontend, D1, and Vectorize all ship the same atlas snapshot.

      - name: Append new node history
        run: pnpm build:history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}

      - name: SPA fallback (copy index.html → 404.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
