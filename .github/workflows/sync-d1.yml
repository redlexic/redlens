name: Sync DBs

on:
  push:
    branches: [main]
    paths:
      - "public/graph.json"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: WorkerDeploy
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build index (generates docs.json)
        run: pnpm build:index

      - name: Build graph
        run: pnpm build:graph

      - name: Check Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is empty — secret may be missing from repo settings"
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN is set (${#CLOUDFLARE_API_TOKEN} chars)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build vectors (Workers AI bge-base-en)
        run: pnpm build:rag
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAG_REQUIRE: "1"

      - name: Build manifest
        run: pnpm build:manifest

      - name: Sync graph data to D1
        run: pnpm graph:remote
        working-directory: redlens-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Sync vectors to Vectorize
        run: pnpm vectors:remote
        working-directory: redlens-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
