name: Sync DBs

on:
  push:
    branches: [main]
    paths:
      # Any artifact change (docs, graph, addresses, chain-state, manifest)
      - "public/manifest.json"
      # History is excluded from manifest.json — trigger directly
      - "public/history/**"
      # Sync + build script changes
      - "redlens-mcp/schema.sql"
      - "redlens-mcp/sync-d1.mjs"
      - "redlens-mcp/sync-vectors.mjs"
      - "scripts/required/build-index.mjs"
      - "scripts/required/build-graph.mjs"
      - "scripts/required/build-rag.mjs"
      - "scripts/required/sync-history.mjs"
      # sync-d1.mjs imports slugify from graph-patterns
      - "scripts/lib/graph-patterns.mjs"
      - ".github/workflows/sync-db.yml"
  workflow_dispatch:

# Parallel syncs would race on D1 writes. Cancel in-flight runs when a
# newer commit triggers — the latest commit always wins.
concurrency:
  group: sync-db
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: build index + graph, sync → D1
  # docs.json and graph.json are gitignored and must be rebuilt from the
  # checked-out atlas submodule before syncing.
  # ─────────────────────────────────────────────────────────────────────────
  sync-d1:
    name: Sync graph + history → D1
    runs-on: ubuntu-latest
    environment: WorkerDeploy
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is empty — secret may be missing from repo settings"
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN is set (${#CLOUDFLARE_API_TOKEN} chars)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build index (docs.json)
        run: pnpm build:index

      - name: Build graph (graph.json)
        run: pnpm build:graph

      - name: Sync graph data to D1
        run: pnpm graph:remote
        working-directory: redlens-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Sync history to D1
        run: pnpm sync:history:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify D1 sync
        run: |
          EXPECTED=$(jq -r .atlasCommit public/manifest.json)
          ACTUAL=$(curl -fsS https://redlens-mcp.anscharo.workers.dev/api/meta | jq -r .atlasCommit)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::D1 sync verification failed."
            echo "  expected atlasCommit: $EXPECTED"
            echo "  actual atlasCommit:   $ACTUAL"
            exit 1
          fi
          echo "D1 sync verified: atlasCommit=$ACTUAL"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: build index, build RAG vectors (incremental), sync → Vectorize
  # docs.json is gitignored and must be rebuilt. The vector cache is keyed
  # on docs.json content; a restore-keys fallback lets build:rag reuse
  # cached vectors for unchanged docs rather than re-embedding everything.
  # Embedder: @huggingface/transformers Xenova/bge-base-en-v1.5 (ONNX, CPU).
  # No CF token needed for embedding; token is only used by vectors:remote.
  # ─────────────────────────────────────────────────────────────────────────
  sync-vectors:
    name: Build RAG vectors → Vectorize
    runs-on: ubuntu-latest
    environment: WorkerDeploy
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check Cloudflare token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is empty — secret may be missing from repo settings"
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN is set (${#CLOUDFLARE_API_TOKEN} chars)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-bge-base-en-v1.5

      - name: Restore vector cache
        id: vector-cache
        uses: actions/cache@v4
        with:
          path: .cache/atlas-vectors
          # Keyed on manifest.json (committed) which changes whenever docs.json
          # changes — docs.json itself is gitignored and doesn't exist yet at
          # cache-key evaluation time (before build:index runs).
          key: atlas-vectors-${{ hashFiles('public/manifest.json') }}
          # Fallback: restore most recent cache so build:rag only re-embeds
          # docs that actually changed rather than starting from scratch.
          restore-keys: |
            atlas-vectors-

      - name: Build index (docs.json)
        run: pnpm build:index

      - name: Build RAG vectors (incremental)
        run: pnpm build:rag

      - name: Sync vectors to Vectorize
        run: pnpm vectors:remote
        working-directory: redlens-mcp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify vectors sync
        run: |
          EXPECTED=$(jq -r .atlasCommit public/manifest.json)
          VECTORS=$(curl -fsS https://redlens-mcp.anscharo.workers.dev/api/meta | jq -r .vectorsAtlasCommit)
          if [ "$EXPECTED" != "$VECTORS" ]; then
            echo "::warning::vectorsAtlasCommit ($VECTORS) does not match atlasCommit ($EXPECTED)"
          fi
          echo "Vectors sync: vectorsAtlasCommit=$VECTORS"
