name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Tests need docs.json + manifest.json on disk. Skip the steps that
      # require network / API keys (build:addresses, build:snapshot) — the
      # cross-artifact test tolerates those being absent.
      - name: Build index + manifest
        run: pnpm build:index && pnpm build:manifest

      # REPRO=1 enables tests/reproducible.test.ts, which runs build:index a
      # second time and asserts byte-identical docs.json + search-index.json.
      - name: Run tests (incl. reproducibility)
        run: pnpm test
        env:
          REPRO: "1"
