[phases.setup]
nixPkgs = ["bun", "git"]

[phases.install]
cmds = ["bun install"]

# build:railway runs build-index/build-graph, which parse
# vendor/next-gen-atlas/content/** — so the submodule MUST be populated. Railway's
# checkout doesn't init submodules, so do it here (idempotent if already present).
# Then regenerate the gitignored artifacts (docs.json, graph.json) and the Vite
# bundle. Skips build:addresses/snapshot/history — those outputs are committed and
# need API keys that belong in Railway env, not the build phase.
[phases.build]
cmds = [
  "git submodule update --init --recursive",
  "bun run build:railway",
]

# Ordering invariant: PG must be current (sync:atlas) before the in-memory
# indexes load + serve. sync is sha-gated, so steady-state boots skip it fast.
# Embeddings are a separate lane (pnpm sync:embeddings), not run at boot.
[start]
cmd = "bun run sync:atlas && bun run start"
